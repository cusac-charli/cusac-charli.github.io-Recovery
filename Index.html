    function App() {
      // --- STATE ---
      const [gameState, setGameState] = useState('storyboard');

      const [toastMessage, setToastMessage] = useState(null);
      
      const [resolutionResults, setResolutionResults] = useState({ good: 0, bad: 0 });
      const [walletCoins, setWalletCoins] = useState(0);
      const [resQueue, setResQueue] = useState([]);
      const [activeAnims, setActiveAnims] = useState([]); 
      const [animSpawnIndex, setAnimSpawnIndex] = useState(-1);
      const [placedItems, setPlacedItems] = useState([]);
      const [flyingCoins, setFlyingCoins] = useState([]);
      const [currentGood, setCurrentGood] = useState(0);
      const [isMenuOpen, setIsMenuOpen] = useState(false);
      const [hoveredZone, setHoveredZone] = useState(null);
      const hasTriggeredEndSequence = useRef(false);
      const [timeUpSpeech, setTimeUpSpeech] = useState(false);

      // New Transition States
      const [isTransitioningToReveal, setIsTransitioningToReveal] = useState(false);
      const [isZoomingOutMap, setIsZoomingOutMap] = useState(false);
      const [fadeToBlack, setFadeToBlack] = useState(false);

      // --- INITIALIZATION ---
      const startGame = () => {
        const randomizedZones = INITIAL_ZONES.map(zone => ({ ...zone, correctOption: Math.random() > 0.5 ? 0 : 1, selectedOption: null }));
        setZones(randomizedZones);
        setRoute([]);
        setTimeLeft(selectedTimerTime);
        setResolutionResults({ good: 0, bad: 0 });
        setPlacedItems([]);
        setResQueue([]);
        setActiveAnims([]);
        setAnimSpawnIndex(-1);
        setFlyingCoins([]);
        setCurrentGood(0);
        hasTriggeredEndSequence.current = false;
        setGameState('planning');
      };

      const resetGame = () => { setGameState('prep'); }
      const quitSession = () => { setIsMenuOpen(false); setGameState('prep'); };

      const getGlobalPos = useCallback((zoneId) => {
        const z = INITIAL_ZONES[zoneId].layout;
        return { x: parseFloat(z.left) + parseFloat(z.width) / 2, y: parseFloat(z.top) + parseFloat(z.height) / 2 };
      }, []);

      const finishExecution = useCallback(() => {
        const q = route.map(id => ({ zoneId: id, isGood: zones[id].selectedOption === zones[id].correctOption }));
        const goodItems = q.filter(x => x.isGood);
        setResolutionResults({ good: goodItems.length });
        setResQueue(goodItems);
        setPlacedItems([]);
        setActiveAnims([]);
        setCurrentGood(0);
        setGameState('resolution');
        
        // Delay animation to allow the new screen to fade in
        setTimeout(() => {
          setAnimSpawnIndex(0); 
        }, 800);
      }, [route, zones]);

      const spawnCoin = (id) => {
        const s = TRAVEL_ITEMS[id].slot;
        const cid = Date.now();
        setFlyingCoins(p => [...p, { id: cid, startX: s.left, startY: s.top }]);
        setTimeout(() => { setWalletCoins(p => p + 10); setFlyingCoins(p => p.filter(c => c.id !== cid)); }, 800);
      };

      // --- TIMERS & LOOPS ---
      // Map Planning Timer
      useEffect(() => {
        let timer;
        if (gameState === 'planning' && timeLeft > 0 && !isTransitioningToReveal) {
          timer = setInterval(() => setTimeLeft(p => p > 0 ? p - 1 : 0), 1000);
        } else if (gameState === 'planning' && timeLeft === 0 && !timeUpSpeech && !isTransitioningToReveal) {
          setTimeUpSpeech(true);
          setTimeout(() => {
            setTimeUpSpeech(false);
            finishPlanning();
          }, 3000);
        }
        return () => clearInterval(timer);
      }, [gameState, timeLeft, timeUpSpeech, isTransitioningToReveal]);

      // --- STAGGERED ANIMATION LOOP ---
      useEffect(() => {
        if (gameState === 'resolution' && animSpawnIndex >= 0 && animSpawnIndex < resQueue.length) {
          const zoneId = resQueue[animSpawnIndex].zoneId;
          const animId = Date.now() + Math.random();
          
          setActiveAnims(prev => [...prev, { animId, zoneId, phase: 'start' }]);
          
          setTimeout(() => {
            setActiveAnims(prev => prev.map(a => a.animId === animId ? { ...a, phase: 'moving' } : a));
          }, 50);

          setTimeout(() => {
            setActiveAnims(prev => prev.filter(a => a.animId !== animId));
            setCurrentGood(p => p + 1);
            setPlacedItems(p => [...p, zoneId]);
            spawnCoin(zoneId);
          }, 1200);

          const t = setTimeout(() => {
            setAnimSpawnIndex(p => p + 1);
          }, 150); 

          return () => clearTimeout(t);
        }
      }, [gameState, animSpawnIndex, resQueue]);

      // --- TRIGGER END SEQUENCE ---
      useEffect(() => {
        if (gameState === 'resolution' && animSpawnIndex === resQueue.length && activeAnims.length === 0 && !hasTriggeredEndSequence.current) {
          hasTriggeredEndSequence.current = true;
          setTimeout(() => {
             setGameState('outro');
          }, 1500); 
        }
      }, [gameState, animSpawnIndex, resQueue.length, activeAnims.length]);

      // --- HELPERS ---
      const selectZone = (id) => {
        if (timeLeft <= 0) return;
        setTransitioningZone(id);
        setPovExiting(false);
        setTimeout(() => {
          setActiveZoneDetail(id);
          setTempChoice(zones[id].selectedOption);
          setTransitioningZone(null);
        }, 100);
      };

      const triggerPovExit = () => {
        setPovExiting(true);
        setTimeout(() => {
          setActiveZoneDetail(null);
          setPovExiting(false);
        }, 400);
      };

      const lockInChoice = () => {
        const newZones = [...zones];
        newZones[activeZoneDetail] = { ...newZones[activeZoneDetail], selectedOption: tempChoice };
        setZones(newZones);
        if (!route.includes(activeZoneDetail)) setRoute([...route, activeZoneDetail]);
        triggerPovExit();
      };

      const cancelChoice = () => { 
        triggerPovExit(); 
      };

      const finishPlanning = () => { 
        setActiveZoneDetail(null);
        setIsTransitioningToReveal(true);
        
        // 1. Give time to read the thought bubble, then zoom out
        setTimeout(() => {
           setIsZoomingOutMap(true);
        }, 1000);

        // 2. Start fading to black while zooming out
        setTimeout(() => {
           setFadeToBlack(true);
        }, 2000);

        // 3. Complete transition, switch to resolution, lift the fade
        setTimeout(() => {
           finishExecution();
           setIsTransitioningToReveal(false);
           setIsZoomingOutMap(false);
           setFadeToBlack(false);
        }, 3000);
      };

      const handlePlanRouteClick = () => {
        if (route.length === INITIAL_ZONES.length) finishPlanning();
        else {

          const missing = 10 - route.length;
          setToastMessage(`${missing} locations still need to be chosen`);
          setTimeout(() => setFlashMissing(true), 10);
          setTimeout(() => { setFlashMissing(false); setToastMessage(null); }, 2000);
        }
      };

      // --- RENDER CALCS ---
      const mapZoomTarget = transitioningZone !== null ? transitioningZone : (activeZoneDetail !== null && !povExiting ? activeZoneDetail : null);
      const isZoomed = mapZoomTarget !== null;

      let mapScale = isZoomed ? 1.45 : 1;
      let mapTx = 0, mapTy = 0;
      
      if (isZoomed) {
          mapTx = (50 - getGlobalPos(mapZoomTarget).x) * 0.45;
          mapTy = (50 - getGlobalPos(mapZoomTarget).y) * 0.45;
      }
      
      if (isZoomingOutMap) {
          mapScale = 0.5;
      }

      let mapTransitionStyle = isZoomingOutMap ? 'transform 1500ms cubic-bezier(0.4, 0, 0.2, 1)' : 'transform 400ms cubic-bezier(0.4, 0, 0.2, 1)';
      let mapOpacity = 1;

      const curProg = activeZoneDetail !== null ? (route.indexOf(activeZoneDetail) !== -1 ? route.indexOf(activeZoneDetail) + 1 : (tempChoice !== null ? route.length + 1 : route.length)) : route.length;
      const isAllComplete = route.length === INITIAL_ZONES.length;

      return (

                        <svg className="absolute inset-0 w-full h-full pointer-events-none stroke-slate-300" fill="none" strokeWidth="3"><line x1="48%" y1="2%" x2="48%" y2="98%" strokeDasharray="8 8" /><line x1="52%" y1="2%" x2="52%" y2="98%" strokeDasharray="8 8" /><ellipse cx="71.5%" cy="37.5%" rx="12%" ry="32%" /><path d="M 88% 25% L 93% 25% L 93% 30% L 95% 33% L 95% 82% A 2% 2% 0 0 1 86% 82% L 86% 33% L 88% 30% Z" /></svg>
                        {Object.values(TRAVEL_ITEMS).map((item) => (<div key={item.id} className="absolute border-[3px] rounded-2xl flex items-center justify-center border-slate-300 border-dashed bg-slate-50/50 overflow-hidden" style={item.slot}><item.Icon size="60%" className="text-blue-500 anim-fade-slow" /></div>))}

                        <div className="absolute bottom-4 left-8 w-40 h-48 z-20"><CharacterIntro /></div>
                      </div>
                      <div className="absolute top-[-30px] right-[-20px] sm:top-[-40px] sm:right-[-40px] bg-white border-[4px] border-[#0ea5e9] rounded-3xl p-6 w-[60%] max-w-[320px] shadow-2xl z-[150] animate-in zoom-in duration-300 pointer-events-auto cursor-default" onClick={(e) => e.stopPropagation()}>

                      </div>

                       </div>
                    </div>

                  <div className="relative w-full max-w-lg aspect-[3/4] bg-slate-800 border-[10px] border-slate-800 rounded-sm shadow-2xl origin-center z-20"

                    {/* Inner container to clip the map grid but allow tooltips to overflow the main border */}
                    <div className="absolute inset-0 overflow-hidden rounded-sm">
                      <div className="absolute inset-0 blueprint-grid w-full h-full">

                                    className={`group absolute flex flex-col items-center justify-center p-2 border-[3px] border-slate-800 transition-all overflow-hidden ${gameState === 'planning' && !isSelected ? 'bg-white/90 hover:bg-cyan-50' : ''} ${isSelected && gameState === 'planning' ? 'z-10' : ''} ${flashMissing && !isSelected && gameState === 'planning' ? 'anim-flash-missing z-20' : ''}`}>

                                <>
                                  <div className={`absolute inset-0 bg-gradient-to-br from-blue-500/80 via-cyan-400/80 to-purple-500/80 bg-[length:200%_200%] animate-[gradient-shift_3s_ease_infinite] z-[1] transition-opacity duration-1000 ${isAllComplete && gameState === 'planning' ? 'opacity-0' : 'opacity-100'}`}></div>

                                </>

                                  </div>;

                              <div className={`relative z-[4] w-full h-full pointer-events-none`}>{renderBlueprintFurniture(zone.id)}</div>
                              <div className={`relative z-10 flex flex-col items-center transition-opacity`}><span className="text-[10px] uppercase font-black text-slate-400 mb-1">{zone.room}</span><span className="text-xs font-bold text-slate-700 leading-tight text-center">{zone.name}</span></div>
                              {isSelected && gameState === 'planning' && (
                                <div className="absolute flex flex-col items-center justify-center z-[25] pointer-events-none transition-opacity group-hover:opacity-20" style={{ top: '50%', left: '50%', transform: 'translate(-50%, -50%)' }}>
                                  <RoutePin number={route.indexOf(zone.id) + 1} className="w-8 h-10" />
                                </div>
                              )}
                            </button>

                        </div>
                      </div>
                    </div>

                    {/* Tooltips rendered outside overflow to prevent cutoff */}
                    {hoveredZone !== null && gameState === 'planning' && !isTransitioningToReveal && activeZoneDetail === null && transitioningZone === null && (() => {
                      const zone = INITIAL_ZONES[hoveredZone];
                      const isTopRow = parseFloat(zone.layout.top) < 25; 
                      const isSelected = route.includes(hoveredZone);
                      return (
                        <div className="absolute z-50 bg-white border-[3px] border-[#0ea5e9] rounded-3xl p-3 shadow-xl pointer-events-none flex flex-col gap-1 min-w-[220px] max-w-[280px] animate-in fade-in zoom-in duration-200"
                             style={{ top: isTopRow ? `calc(${zone.layout.top} + ${zone.layout.height})` : `calc(${zone.layout.top})`, left: `calc(${zone.layout.left} + ${zone.layout.width}/2)`, transform: isTopRow ? 'translate(-50%, 15px)' : 'translate(-50%, -115%)' }}>
                          <div className={`absolute left-1/2 transform -translate-x-1/2 w-4 h-4 bg-white rotate-45 ${isTopRow ? '-top-[10px] border-t-[3px] border-l-[3px] border-[#0ea5e9]' : '-bottom-[10px] border-b-[3px] border-r-[3px] border-[#0ea5e9]'}`}></div>
                          
                          {!isSelected ? (
                            <div className="flex items-start gap-3 relative z-10">

                            <div className="flex flex-col relative z-10 px-1 py-0.5">

                  </div>

                  {gameState === 'planning' && !isTransitioningToReveal && (
                    <div className={`fixed bottom-8 inset-x-0 flex flex-col items-center justify-end z-[80] pointer-events-none gap-4 transition-opacity duration-300 ${activeZoneDetail !== null ? 'opacity-0' : 'opacity-100'}`}>

                      <button onClick={handlePlanRouteClick} className={`pointer-events-auto py-2.5 px-8 rounded-[2rem] font-black text-2xl shadow-xl transition-all duration-300 border-[3.5px] flex items-center gap-3 overflow-hidden relative ${route.length === INITIAL_ZONES.length ? 'bg-[#0ea5e9] border-[#0ea5e9] text-white hover:bg-[#0284c7] hover:border-[#0284c7] hover:scale-105 anim-all-complete-shine' : 'bg-white border-blue-500 text-blue-500 hover:bg-blue-50 hover:scale-105 opacity-95'} ${activeZoneDetail !== null ? 'opacity-0 scale-90 pointer-events-none' : ''}`}>

                      </button>

                  {gameState === 'prep' && (<div className="absolute inset-0 z-50 flex items-center justify-center bg-white/70 backdrop-blur-sm p-4 animate-in fade-in duration-500"><div className="bg-white p-8 md:p-12 rounded-3xl border-4 border-blue-100 text-center max-w-xl shadow-[0_30px_60px_rgba(0,0,0,0.1)]"><Search className="w-16 h-16 text-blue-500 mx-auto mb-6" /><h2 className="text-3xl font-black text-slate-800 mb-4 tracking-tight">Dowsing Preparation</h2><p className="text-slate-500 mb-8 leading-relaxed font-medium">Grab your pendulum or dowsing rods. Trust your gut and feel the pull!</p><div className="mb-8"><div className="flex justify-center gap-3">{[60, 120, 180].map(time => (<button key={time} onClick={() => setSelectedTimerTime(time)} className={`px-6 py-3 rounded-full font-black text-md transition-all border-4 ${selectedTimerTime === time ? 'bg-blue-500 border-blue-500 text-white shadow-lg transform scale-105' : 'bg-white border-blue-100 text-slate-400 hover:border-blue-300'}`}>{time / 60} Min</button>))}</div></div><button onClick={startGame} className="bg-slate-800 hover:bg-slate-700 text-white px-10 py-5 rounded-full font-black text-xl transition-all transform hover:scale-105 flex items-center gap-3 mx-auto shadow-xl w-full justify-center"><Play size={24} fill="currentColor" />Plan Search Locations</button></div></div>)}
                </div>
              )}

              {/* POV */}
              {activeZoneDetail !== null && (
                <>
                  {/* POV Solid Background Layer */}
                  <div className={`fixed inset-0 z-[90] halftone-bg transition-opacity duration-[600ms] ease-in-out ${povExiting ? 'opacity-0 pointer-events-none' : 'opacity-100 anim-pov-bg-enter'}`} />
                  
                  {/* POV Content Layer */}
                  <div className={`absolute inset-0 z-[95] flex flex-col items-center justify-center transition-all duration-[600ms] ease-in-out ${povExiting ? 'opacity-0 scale-95 pointer-events-none' : 'opacity-100 scale-100 anim-pov-enter'}`}>
                    <svg className="absolute inset-0 w-full h-full pointer-events-none z-[5]" preserveAspectRatio="none" viewBox="0 0 100 100"><line x1="58" y1="-10" x2="42" y2="110" stroke="#0ea5e9" strokeWidth="1" /></svg>
                    <div className="absolute inset-0 flex flex-row z-10">
                      {zones[activeZoneDetail].options.map((text, index) => {

                        return (
                          <div key={index} className="flex-1 relative flex flex-col items-center justify-center cursor-pointer group" onClick={() => setTempChoice(index)} onMouseEnter={() => setHoveredZone(index)} onMouseLeave={() => setHoveredZone(null)}>
                            <div className="relative flex flex-col items-center justify-center pointer-events-none w-full h-full">
                              <IconComp size={220} className={`relative z-20 transition-all duration-300 ${isSelected ? `drop-shadow-xl scale-105` : isHovered ? `scale-105` : `text-slate-800 ${tempChoice === null ? 'anim-pulse-item' : ''}`}`} strokeWidth={1.5} stroke={isSelected ? '#1e3a8a' : (isHovered ? '#0ea5e9' : '#1e293b')} fill={isSelected ? '#bae6fd' : '#ffffff'} />
                              <div className={`absolute z-40 transform -translate-y-[140px] bg-white border-[3px] rounded-full px-5 py-1.5 font-black text-[15px] shadow-sm transition-all duration-300 ${isSelected ? 'border-[#8b5cf6] text-[#8b5cf6] scale-105' : isHovered ? 'border-[#0ea5e9] text-[#0ea5e9] scale-105' : 'border-slate-200 text-slate-500'}`}>
                                {text}
                              </div>
                              <div className={`absolute top-[35%] ${index === 0 ? 'right-[55%]' : 'left-[55%]'} w-[120px] h-[80px] pointer-events-none z-30`} style={{ color: isSelected ? '#a855f7' : (isHovered ? '#0ea5e9' : '#1e293b') }}><svg className="w-full h-full overflow-visible absolute inset-0"><polyline points={index === 0 ? "0,20 50,20 120,80" : "120,20 70,20 0,80"} fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinejoin="round" /><circle cx={index === 0 ? 120 : 0} cy={80} r={5} fill="currentColor" /></svg><div className={`absolute ${index === 0 ? 'left-0' : 'left-[120px]'} top-[20px] transform -translate-x-1/2 -translate-y-1/2 pointer-events-auto`}>{Badge}</div></div>

                  </div>
                </>
              )}

              {/* RESOLUTION (Travel Bag Reveal) */}
              {gameState === 'resolution' && (
                <div className="w-full h-full flex flex-col justify-center items-center px-4 animate-in fade-in zoom-in-[0.85] duration-1000 ease-out">
                  <h2 className="text-4xl md:text-5xl font-black text-[#0ea5e9] tracking-tight uppercase mb-8">{currentGood} ITEM{currentGood !== 1 ? 'S' : ''} FOUND...</h2>
                  <div className="w-full aspect-[16/9] border-4 border-slate-400 bg-white rounded-2xl relative shadow-2xl overflow-hidden travel-bag-bg">
                    {Object.values(TRAVEL_ITEMS).map(item => (<div key={item.id} className={`absolute border-[3px] rounded-2xl flex items-center justify-center transition-all duration-700 ${placedItems.includes(item.id) ? 'border-blue-400 bg-blue-100/70 shadow-[inset_0_0_20px_rgba(59,130,246,0.3)]' : 'border-slate-300 border-dashed bg-slate-50/50'}`} style={item.slot}>{placedItems.includes(item.id) && <item.Icon size="60%" className="text-blue-600 animate-in zoom-in duration-500" />}</div>))}
                    {activeAnims.map(anim => (
                      <div key={anim.animId} className="absolute z-50 flex items-center justify-center transition-all duration-[1200ms]" 
                           style={{ 
                             width: TRAVEL_ITEMS[anim.zoneId].slot.width, 
                             height: TRAVEL_ITEMS[anim.zoneId].slot.height, 
                             top: anim.phase === 'start' ? '50%' : TRAVEL_ITEMS[anim.zoneId].slot.top, 
                             left: anim.phase === 'start' ? '50%' : TRAVEL_ITEMS[anim.zoneId].slot.left, 
                             transform: anim.phase === 'start' ? 'translate(-50%, -50%) scale(2)' : 'translate(0, 0) scale(1)', 
                             opacity: 1
                           }}>
                        {(() => {
                          const AnimIcon = TRAVEL_ITEMS[anim.zoneId].Icon; 
                          return (
                            <div className="relative flex items-center justify-center w-full h-full">
                              <AnimIcon size="80%" className="text-blue-500 drop-shadow-2xl transition-colors" fill="currentColor" />
                            </div>
                          );
                        })()}
                      </div>
                    ))}
                    {flyingCoins.map(coin => (<div key={coin.id} className="absolute z-[100] anim-coin-new" style={{'--sx': coin.startX, '--sy': coin.startY}}><Coins className="text-yellow-400 w-12 h-12 drop-shadow-xl" fill="currentColor" /></div>))}
                  </div>
                </div>
              )}

              {/* OUTRO / SCORE BACKGROUND & MODAL */}
              {(gameState === 'outro' || gameState === 'score') && (() => {
                const tier = resolutionResults.good >= 8 ? 'success' : (resolutionResults.good >= 5 ? 'above_average' : 'below_average');
                let Character = CharacterSuccess;
                let message = "";
                
                if (tier === 'success') {
                  Character = CharacterSuccess;
                  message = "Thank you so much for your help\nSunny beach here I come!";
                } else if (tier === 'above_average') {
                  Character = CharacterAboveAvg;
                  message = "Made it just in time! Thank you so much for your help. I wonder where I left the other valuables... anyways\nSunny beach here I come!";
                } else {
                  Character = CharacterBelowAvg;
                  message = "Ouf that was a close one... I didn’t find enough stuff, but I’ll just have to buy new one over there.\nThank you for your help";
                }
                
                return (
                  <div className="flex flex-col w-full h-full items-center justify-center -mt-16 animate-in fade-in duration-500 z-[100] overflow-visible absolute inset-0 bg-[#faf6f0]">
                    <div className="w-full max-w-4xl aspect-[21/9] border-[5px] border-[#0ea5e9] bg-white rounded-2xl relative shadow-2xl mb-8 overflow-hidden pointer-events-none">
                      
                      <CloudIcon className="absolute top-8 left-16 text-[#0ea5e9] w-24 h-24 opacity-80" />
                      <CloudIcon className="absolute top-12 right-32 text-[#0ea5e9] w-16 h-16 opacity-80" />
                      <CloudIcon className="absolute top-32 left-[40%] text-[#0ea5e9] w-20 h-20 opacity-60" />
                      
                      <div className="absolute top-[20%] left-[10%] w-64 h-64 transform -rotate-12"><LineArtPlane /></div>
                      <div className="absolute bottom-[-10px] right-5 w-64 h-64"><Character /></div>
                      
                      {gameState === 'outro' && (
                        <div className="absolute bottom-10 left-10 bg-white border-[4px] border-[#0ea5e9] rounded-[1.5rem] p-6 max-w-[50%] shadow-lg z-30 cursor-pointer pointer-events-auto" onClick={() => setGameState('score')}>
                          <p className="text-[#0ea5e9] font-bold text-sm md:text-base leading-snug whitespace-pre-line">{message}</p>
                          <ChevronDown size={24} className="text-[#0ea5e9] absolute bottom-4 right-4 animate-bounce" />
                        </div>
                      )}
                    </div>

                    {/* SCORE MODAL OVERLAY */}
                    {gameState === 'score' && (
                      <div className="absolute inset-0 z-[110] flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4 animate-in fade-in zoom-in duration-500">
                        <div className="bg-white rounded-[2rem] border-[4px] border-[#0ea5e9] max-w-[360px] w-full text-center shadow-2xl px-6 py-10 flex flex-col items-center">
                          <h2 className="text-3xl font-black text-[#0ea5e9] mb-4 uppercase tracking-tight">AMAZING WORK!</h2>
                          
                          <div className="w-16 h-16 rounded-full bg-[#f3f4f6] border-4 border-[#d1d5db] flex items-center justify-center mb-4 shadow-inner text-slate-400">
                            <Award size={32} fill="currentColor" strokeWidth={1.5} />
                          </div>
                          
                          <p className="text-[#0ea5e9] text-lg mb-1 tracking-wide">
                            You've manage to <br/>find <span className="font-black text-xl">{resolutionResults.good}/10 items</span>
                          </p>
                          <p className="text-[#0ea5e9] opacity-90 font-medium text-sm mb-6">(Accuracy {Math.round((resolutionResults.good / 10) * 100)}%)</p>
                          
                          <div className="flex justify-center items-center gap-6 mb-8 w-full border-t-[2px] border-slate-100 pt-6">
                            <div className="flex items-center gap-2"><WalletIconUI className="w-8 h-8 text-[#0ea5e9]" strokeWidth={2.5}/><span className="text-[#0ea5e9] font-black text-xl">+{resolutionResults.good * 10}</span></div>
                            <div className="flex items-center gap-2"><Droplets className="w-8 h-8 text-[#0ea5e9]" strokeWidth={2.5}/><span className="text-[#0ea5e9] font-black text-xl">3x</span></div>
                          </div>
                          
                          <button onClick={resetGame} className="bg-[#0ea5e9] hover:bg-[#0284c7] text-white px-8 py-4 rounded-xl font-black text-lg transition-all w-full shadow-md uppercase tracking-widest active:scale-95">Return to Lobby</button>
                        </div>
                      </div>
                    )}
                  </div>
                );
              })()}

            </div>
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
